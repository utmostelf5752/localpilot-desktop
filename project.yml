name: LocalPilotDesktop
options:
  bundleIdPrefix: com.localpilot
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    PRODUCT_NAME: LocalPilotDesktop
targets:
  LocalPilotDesktop:
    type: application
    platform: macOS
    sources:
      - path: apps/macos/Sources
      - path: core/agent
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.localpilot.desktop
        INFOPLIST_FILE: apps/macos/Info.plist
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
    entitlements:
      path: apps/macos/LocalPilotDesktop.entitlements
    scheme:
      testTargets:
        - LocalPilotDesktopTests
  LocalPilotDesktopTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: apps/macos/Tests
    dependencies:
      - target: LocalPilotDesktop
    hostApplication: LocalPilotDesktop
    settings:
      base:
        PRODUCT_NAME: LocalPilotDesktopTests
        PRODUCT_MODULE_NAME: LocalPilotDesktopTests
        PRODUCT_BUNDLE_IDENTIFIER: com.localpilot.desktop.tests
        GENERATE_INFOPLIST_FILE: YES
